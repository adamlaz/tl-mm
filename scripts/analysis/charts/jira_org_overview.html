<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600&family=Noto+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/echarts@6.0.0/dist/echarts.min.js"></script>

<style>
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#FFFFFF;font-family:'Noto Sans',sans-serif}
#chart{width:100%;height:100%;min-height:400px}
@media(prefers-color-scheme:dark){html,body{background:#1E1A1A}}
</style>
</head>
<body>
<div id="chart"></div>
<script>
(function(){
  echarts.registerTheme('tl-dark',{"backgroundColor": "#1E1A1A", "textStyle": {"color": "#E8E4DE"}, "title": {"textStyle": {"color": "#E8E4DE"}, "subtextStyle": {"color": "#8A8070"}}, "legend": {"textStyle": {"color": "#B0A890"}}, "tooltip": {"backgroundColor": "#1E1A1A", "borderColor": "#4A4038", "textStyle": {"color": "#E8E4DE"}}, "categoryAxis": {"axisLine": {"lineStyle": {"color": "#4A4038"}}, "axisTick": {"lineStyle": {"color": "#4A4038"}}, "axisLabel": {"color": "#8A8070"}, "splitLine": {"lineStyle": {"color": "#3A3430"}}}, "valueAxis": {"axisLine": {"lineStyle": {"color": "#4A4038"}}, "axisTick": {"lineStyle": {"color": "#4A4038"}}, "axisLabel": {"color": "#8A8070"}, "splitLine": {"lineStyle": {"color": "#3A3430"}}}, "color": ["#6B7FE0", "#3AC4B4", "#D4A74A", "#D46A5A", "#8A9EC0", "#8ACC7A", "#B48AB4", "#C89060"]});
  var rm=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  var dk=window.matchMedia('(prefers-color-scheme:dark)').matches;
  var el=document.getElementById('chart');
  var chart=echarts.init(el,dk?'tl-dark':null,{renderer:'canvas',useDirtyRect:true});
  var option={"backgroundColor": "transparent", "textStyle": {"fontFamily": "Noto Sans"}, "title": {"text": "Issue Volume by Organizational Segment", "textStyle": {"fontFamily": "Noto Sans", "fontWeight": 600, "fontSize": 14, "color": "#2E2820"}, "subtextStyle": {"fontFamily": "Noto Sans", "fontSize": 11, "color": "#8A8070"}, "left": "center", "top": 4, "subtext": "Source: Jira, extracted April 2026"}, "tooltip": {"trigger": "axis", "backgroundColor": "#FFFFFF", "borderColor": "#D0C8BA", "textStyle": {"fontFamily": "Noto Sans", "fontSize": 12, "color": "#2E2820"}, "borderRadius": 6, "extraCssText": "box-shadow: 0 2px 8px rgba(0,0,0,0.08);"}, "legend": {"textStyle": {"fontFamily": "Noto Sans", "fontSize": 11, "color": "#5A5048"}, "bottom": 0, "icon": "roundRect", "itemWidth": 12, "itemHeight": 8}, "grid": {"containLabel": true, "left": 16, "right": 16, "top": 56, "bottom": 48}, "aria": {"enabled": true, "decal": {"show": true}}, "animationType": "scale", "animationEasing": "quartOut", "animationDuration": 600, "xAxis": {"type": "value", "axisLabel": {"fontFamily": "Noto Sans Mono", "fontSize": 10, "color": "#8A8070"}, "axisLine": {"lineStyle": {"color": "#D0C8BA"}}, "axisTick": {"lineStyle": {"color": "#D0C8BA"}}, "splitLine": {"lineStyle": {"color": "#E8E4DE", "type": "solid"}}, "name": "Issues", "nameTextStyle": {"fontFamily": "Noto Sans", "fontSize": 11, "color": "#5A5048"}, "nameLocation": "middle", "nameGap": 46}, "yAxis": {"type": "category", "axisLabel": {"fontFamily": "Noto Sans Mono", "fontSize": 10, "color": "#8A8070"}, "axisLine": {"lineStyle": {"color": "#D0C8BA"}}, "axisTick": {"lineStyle": {"color": "#D0C8BA"}}, "splitLine": {"show": false}, "data": ["Engineering", "Customer Success", "Operations"], "name": "Segment", "nameTextStyle": {"fontFamily": "Noto Sans", "fontSize": 11, "color": "#5A5048"}, "nameLocation": "middle", "nameGap": 30}, "series": [{"name": "Issues", "type": "bar", "data": [0, 0, 0], "itemStyle": {"color": "#4A5FC4"}}], "toolbox": {"show": true, "right": 16, "top": 4, "feature": {"saveAsImage": {"title": "Save as PNG", "pixelRatio": 2}, "dataView": {"title": "Data", "readOnly": true, "textareaColor": "#FFFFFF", "textColor": "#2E2820"}, "restore": {"title": "Reset"}}, "iconStyle": {"borderColor": "#8A8070"}, "emphasis": {"iconStyle": {"borderColor": "#2E2820"}}}};
  if(rm){option.animation=false;(option.series||[]).forEach(function(s){s.animation=false;if(s.detail)s.detail.valueAnimation=false})}
  var rendered=false;
  function render(){if(rendered)return;rendered=true;chart.setOption(option)}
  if(rm){render()}else{
    var obs=new IntersectionObserver(function(entries){if(entries[0].isIntersecting){render();obs.disconnect()}},{threshold:0.15});
    obs.observe(el);
    setTimeout(render,2000);
  }
  window.addEventListener('resize',function(){chart.resize()});
  window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',function(e){
    chart.dispose();
    chart=echarts.init(el,e.matches?'tl-dark':null,{renderer:'canvas',useDirtyRect:true});
    chart.setOption(option);
  });
  window.addEventListener('message',function(e){
    if(e.data&&e.data.theme){
      chart.dispose();
      chart=echarts.init(el,e.data.theme==='dark'?'tl-dark':null,{renderer:'canvas',useDirtyRect:true});
      chart.setOption(option);
    }
  });
})();
</script>
</body>
</html>
